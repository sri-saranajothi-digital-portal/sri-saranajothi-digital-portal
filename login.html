<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SASUNA Login</title>

    <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>

<div class="login-box">

    <img src="logo.jpg" class="logo">

    <h2>SASUNA</h2>

    <p>Sri Saranajothi Digital Platform</p>

    <input
        type="email"
        id="email"
        placeholder="Email Address">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <button id="loginBtn">
        Login
    </button>

    <div id="message"></div>

</div>

<script type="module" src="./assets/js/login.js"></script>
</body>
</html>
